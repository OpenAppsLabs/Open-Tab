<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>New Tab</title>
        <link rel="icon" type="image/png" href="assets/logo-32.png" />
        <link rel="stylesheet" href="style.css" />
    </head>

    <body>
        <header class="top-header">
            <div class="top-right-controls">
                <button id="qr-open-btn" class="icon-btn" title="Send to Phone">
                    <svg
                        xmlns="http://www.w3.org/2000/svg"
                        width="20"
                        height="20"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                    >
                        <rect width="5" height="5" x="3" y="3" rx="1" />
                        <rect width="5" height="5" x="16" y="3" rx="1" />
                        <rect width="5" height="5" x="3" y="16" rx="1" />
                        <path d="M21 16h-3a2 2 0 0 0-2 2v3" />
                        <path d="M21 21v.01" />
                        <path d="M12 7v3a2 2 0 0 1-2 2H7" />
                        <path d="M3 12h.01" />
                        <path d="M12 3h.01" />
                        <path d="M12 16v.01" />
                        <path d="M16 12h1" />
                        <path d="M21 12v.01" />
                        <path d="M12 21v.01" />
                    </svg>
                </button>

                <button
                    id="theme-toggle"
                    class="theme-btn"
                    title="Toggle Theme"
                >
                    <svg
                        id="sun-icon"
                        class="icon"
                        xmlns="http://www.w3.org/2000/svg"
                        width="20"
                        height="20"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                    >
                        <circle cx="12" cy="12" r="4" />
                        <path d="M12 2v2" />
                        <path d="M12 20v2" />
                        <path d="m4.93 4.93 1.41 1.41" />
                        <path d="m17.66 17.66 1.41 1.41" />
                        <path d="M2 12h2" />
                        <path d="M20 12h2" />
                        <path d="m6.34 17.66-1.41 1.41" />
                        <path d="m19.07 4.93-1.41 1.41" />
                    </svg>
                    <svg
                        id="moon-icon"
                        class="icon"
                        xmlns="http://www.w3.org/2000/svg"
                        width="20"
                        height="20"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                    >
                        <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z" />
                    </svg>
                </button>
            </div>
        </header>

        <main class="content">
            <div class="search-container">
                <form
                    id="search-form"
                    action="https://www.google.com/search"
                    method="GET"
                    class="search-box"
                >
                    <div
                        class="engine-selector"
                        id="engine-selector"
                        title="Change Search Engine"
                        role="combobox"
                        aria-expanded="false"
                        aria-haspopup="listbox"
                    >
                        <img
                            id="engine-icon"
                            src="assets/google.png"
                            alt="Engine"
                            width="24"
                            height="24"
                        />

                        <div
                            class="engine-menu"
                            id="engine-menu"
                            role="listbox"
                        >
                            <div
                                class="engine-option"
                                role="option"
                                data-value="google"
                                data-action="https://www.google.com/search"
                                data-param="q"
                                data-icon="assets/google.png"
                            >
                                <img
                                    src="assets/google.png"
                                    width="20"
                                    height="20"
                                />
                                Google
                            </div>

                            <div
                                class="engine-option"
                                role="option"
                                data-value="duckduckgo"
                                data-action="https://duckduckgo.com/"
                                data-param="q"
                                data-icon="assets/duckduckgo.png"
                            >
                                <img
                                    src="assets/duckduckgo.png"
                                    width="20"
                                    height="20"
                                />
                                DuckDuckGo
                            </div>

                            <div
                                class="engine-option"
                                role="option"
                                data-value="bing"
                                data-action="https://www.bing.com/search"
                                data-param="q"
                                data-icon="assets/bing.png"
                            >
                                <img
                                    src="assets/bing.png"
                                    width="20"
                                    height="20"
                                />
                                Bing
                            </div>
                        </div>
                    </div>

                    <input
                        type="text"
                        id="search-input"
                        name="q"
                        class="search-input"
                        placeholder="Search"
                        autocomplete="off"
                        spellcheck="false"
                    />

                    <button
                        type="button"
                        id="mic-btn"
                        class="mic-btn"
                        title="Voice Search"
                    >
                        <svg
                            xmlns="http://www.w3.org/2000/svg"
                            width="20"
                            height="20"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                        >
                            <path
                                d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"
                            />
                            <path d="M19 10v2a7 7 0 0 1-14 0v-2" />
                            <line x1="12" x2="12" y1="19" y2="22" />
                        </svg>
                    </button>
                </form>
            </div>

            <div class="quick-links" id="quick-links-container"></div>
        </main>

        <div id="qr-modal" class="modal-overlay">
            <div class="modal-content qr-modal-box">
                <h3>Send to Phone</h3>
                <input
                    type="text"
                    id="qr-input"
                    placeholder="Paste link or text here..."
                    autocomplete="off"
                />

                <div class="qr-display-container">
                    <div id="qr-placeholder">
                        <svg
                            xmlns="http://www.w3.org/2000/svg"
                            width="32"
                            height="32"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="1.5"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                        >
                            <rect width="5" height="5" x="3" y="3" rx="1" />
                            <rect width="5" height="5" x="16" y="3" rx="1" />
                            <rect width="5" height="5" x="3" y="16" rx="1" />
                            <path d="M21 16h-3a2 2 0 0 0-2 2v3" />
                            <path d="M21 21v.01" />
                            <path d="M12 7v3a2 2 0 0 1-2 2H7" />
                            <path d="M3 12h.01" />
                            <path d="M12 3h.01" />
                            <path d="M12 16v.01" />
                            <path d="M16 12h1" />
                            <path d="M21 12v.01" />
                            <path d="M12 21v.01" />
                        </svg>
                        <span>QR will appear here</span>
                    </div>
                    <div id="qrcode"></div>
                </div>

                <div class="modal-actions">
                    <button id="qr-close-btn" class="modal-btn cancel">
                        Close
                    </button>
                </div>
            </div>
        </div>

        <div id="add-link-modal" class="modal-overlay">
            <div class="modal-content">
                <h3>Add Quick Link</h3>
                <input
                    type="text"
                    id="new-link-name"
                    placeholder="Title"
                    autocomplete="off"
                />
                <input
                    type="text"
                    id="new-link-url"
                    placeholder="URL"
                    autocomplete="off"
                />
                <div class="modal-actions">
                    <button id="cancel-link-btn" class="modal-btn cancel">
                        Cancel
                    </button>
                    <button id="save-link-btn" class="modal-btn save">
                        Add
                    </button>
                </div>
            </div>
        </div>

        <div id="undo-toast" class="toast">
            <span>Shortcut removed</span>
            <button id="undo-btn">Undo</button>
        </div>

        <button
            id="settings-btn"
            class="icon-btn settings-btn"
            title="Settings"
            aria-label="Open Settings"
        >
            <svg
                xmlns="http://www.w3.org/2000/svg"
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
            >
                <circle cx="12" cy="12" r="3"></circle>
                <path
                    d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"
                ></path>
            </svg>
        </button>

        <div id="settings-modal" class="modal-overlay" aria-hidden="true">
            <div
                class="modal-content settings-modal-box"
                role="dialog"
                aria-modal="true"
                aria-labelledby="settings-heading"
            >
                <div class="settings-layout">
                    <aside class="settings-sidebar">
                        <h3 id="settings-heading">Settings</h3>
                        <nav class="settings-nav">
                            <button
                                class="tab-btn active"
                                data-target="pane-appearance"
                            >
                                Appearance
                            </button>
                            <button class="tab-btn" data-target="pane-search">
                                Search
                            </button>
                            <button class="tab-btn" data-target="pane-links">
                                Quick Links
                            </button>
                            <!--<button class="tab-btn" data-target="pane-data">
                                Data & Backup
                            </button>-->
                            <button class="tab-btn" data-target="pane-about">
                                About
                            </button>
                        </nav>
                    </aside>

                    <section class="settings-content">
                        <div id="pane-appearance" class="settings-pane active">
                            <h4>Appearance</h4>
                            <div class="setting-group">
                                <label>Theme</label>
                                <div
                                    class="segmented-control"
                                    id="theme-segments"
                                >
                                    <button data-value="system">System</button>
                                    <button data-value="light">Light</button>
                                    <button data-value="dark">Dark</button>
                                </div>
                            </div>
                            <div class="setting-group switch-group">
                                <label>Show Theme Toggle in Header</label>
                                <label class="toggle-switch">
                                    <input
                                        type="checkbox"
                                        id="setting-show-theme-btn"
                                        checked
                                    />
                                    <span class="slider"></span>
                                </label>
                            </div>
                            <div class="setting-group switch-group">
                                <label>Show QR Button in Header</label>
                                <label class="toggle-switch">
                                    <input
                                        type="checkbox"
                                        id="setting-show-qr-btn"
                                        checked
                                    />
                                    <span class="slider"></span>
                                </label>
                            </div>
                        </div>

                        <div id="pane-search" class="settings-pane">
                            <h4>Search</h4>
                            <div class="setting-group">
                                <label>Default Engine</label>
                                <div
                                    class="segmented-control"
                                    id="engine-segments"
                                >
                                    <button data-value="google">Google</button>
                                    <button data-value="duckduckgo">
                                        DuckDuckGo
                                    </button>
                                    <button data-value="bing">Bing</button>
                                </div>
                            </div>
                            <div class="setting-group">
                                <label>Open Results In</label>
                                <div
                                    class="segmented-control"
                                    id="target-segments"
                                >
                                    <button data-value="_self">
                                        Current Tab
                                    </button>
                                    <button data-value="_blank">New Tab</button>
                                </div>
                            </div>
                        </div>

                        <div id="pane-links" class="settings-pane">
                            <h4>Quick Links</h4>
                            <div class="setting-group switch-group">
                                <label>Show Quick Links</label>
                                <label class="toggle-switch">
                                    <input
                                        type="checkbox"
                                        id="setting-show-links"
                                        checked
                                    />
                                    <span class="slider"></span>
                                </label>
                            </div>
                            <div class="setting-group" style="margin-top: 20px">
                                <button
                                    id="btn-restore-links"
                                    class="modal-btn cancel"
                                >
                                    Restore Default Links
                                </button>
                            </div>

                            <div class="setting-group switch-group">
                                <label>Show Edit Button</label>
                                <label class="toggle-switch">
                                    <input
                                        type="checkbox"
                                        id="setting-show-edit"
                                        checked
                                    />
                                    <span class="slider"></span>
                                </label>
                            </div>

                            <div class="setting-group switch-group">
                                <label>Show Delete Button</label>
                                <label class="toggle-switch">
                                    <input
                                        type="checkbox"
                                        id="setting-show-delete"
                                        checked
                                    />
                                    <span class="slider"></span>
                                </label>
                            </div>
                        </div>

                        <div id="pane-about" class="settings-pane">
                            <h4>About</h4>

                            <div class="setting-group">
                                <label>Name</label>
                                <div class="about-box">
                                    <div class="about-main">
                                        <span class="about-name">Open Tab</span>
                                    </div>
                                </div>
                            </div>

                            <div class="setting-group">
                                <label>Repository</label>
                                <div class="about-box clickable">
                                    <a
                                        href="https://github.com/OpenAppsLabs/Open-Tab"
                                        target="_blank"
                                        >Source Code</a
                                    >
                                </div>
                            </div>

                            <div class="setting-group">
                                <label>License</label>
                                <div class="about-box clickable">
                                    <a
                                        href="https://www.gnu.org/licenses/agpl-3.0.html"

                                    >
                                </div>
                            </div>
                        </div>
                    </section>
                </div>
            </div>
        </div>

        <script src="qrcode.min.js" defer></script>
        <script src="newtab.js" defer></script>
    </body>
</html>
